<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mywiki</title>
<style>
  :root {
    --bg: #0f172a; --panel-bg: #111827; --panel-border: #1f2937;
    --text: #e2e8f0; --text-dim: #94a3b8; --text-faint: #64748b;
    --accent: #22d3ee; --blue: #3b82f6; --amber: #f59e0b; --gray: #64748b;
    --node-fill: #1e293b;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--text); }

  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
  #canvas.panning { cursor: grabbing; }

  /* ---- nodes ---- */
  .node { cursor: pointer; }
  .node rect { fill: var(--node-fill); stroke: var(--blue); stroke-width: 1.5; rx: 10; }
  .node.external rect { stroke: var(--amber); stroke-dasharray: 6 4; }
  .node.support rect { stroke: var(--gray); }
  .node .label { fill: var(--text); font-size: 14px; font-weight: 600; pointer-events: none; }
  .node .sublabel { fill: var(--text-faint); font-size: 10.5px; pointer-events: none; }
  .node:hover rect { stroke-width: 2.5; }
  .node.selected rect { stroke: var(--accent); stroke-width: 2.5;
    filter: drop-shadow(0 0 6px rgba(34,211,238,.55)); }
  .dimmed { opacity: .22; transition: opacity .15s; }

  /* ---- edges ---- */
  .edge { cursor: pointer; }
  .edge .line { fill: none; stroke: #475569; stroke-width: 1.6; }
  .edge .hit { fill: none; stroke: transparent; stroke-width: 16; }
  .edge .elabel { fill: var(--text-dim); font-size: 10.5px; pointer-events: none;
    paint-order: stroke; stroke: var(--bg); stroke-width: 4; }
  .edge:hover .line { stroke: var(--text-dim); stroke-width: 2.2; }
  .edge.selected .line, .edge.hl .line { stroke: var(--accent); stroke-width: 2.2; }
  .edge.selected .elabel, .edge.hl .elabel { fill: var(--accent); }

  /* ---- header ---- */
  #header { position: absolute; top: 0; left: 0; right: 0; display: flex;
    align-items: center; gap: 16px; padding: 12px 18px; pointer-events: none; z-index: 5;
    background: linear-gradient(to bottom, rgba(15,23,42,.92), rgba(15,23,42,0)); }
  #header > * { pointer-events: auto; }
  #title h1 { font-size: 17px; font-weight: 700; }
  #title .meta { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
  #title .meta a { color: var(--text-dim); text-decoration: none; }
  #title .meta a:hover { color: var(--accent); }
  #searchbox { margin-left: auto; position: relative; }
  #search { width: 220px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--panel-border);
    background: rgba(17,24,39,.9); color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #results { position: absolute; top: 38px; right: 0; width: 260px; background: var(--panel-bg);
    border: 1px solid var(--panel-border); border-radius: 8px; overflow: hidden; display: none; }
  #results div { padding: 8px 12px; font-size: 13px; cursor: pointer; }
  #results div:hover { background: #1e293b; }
  #results .k { color: var(--text-faint); font-size: 11px; margin-left: 6px; }

  /* ---- legend / help ---- */
  #legend { position: absolute; left: 16px; bottom: 14px; font-size: 11.5px;
    color: var(--text-faint); z-index: 5; line-height: 1.9; }
  #legend .sw { display: inline-block; width: 18px; height: 10px; border-radius: 3px;
    margin-right: 6px; vertical-align: middle; border: 1.5px solid; background: var(--node-fill); }
  #help { position: absolute; right: 16px; bottom: 14px; font-size: 11.5px;
    color: var(--text-faint); z-index: 5; }

  /* ---- detail panel ---- */
  #panel { position: absolute; top: 0; right: 0; bottom: 0; width: 400px; max-width: 92vw;
    background: var(--panel-bg); border-left: 1px solid var(--panel-border); z-index: 10;
    transform: translateX(105%); transition: transform .22s ease; display: flex; flex-direction: column; }
  #panel.open { transform: translateX(0); }
  #panel-head { padding: 18px 20px 12px; border-bottom: 1px solid var(--panel-border); }
  #panel-kind { display: inline-block; font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 99px; border: 1px solid var(--text-faint); color: var(--text-dim); margin-bottom: 8px; }
  #panel-title { font-size: 19px; font-weight: 700; }
  #panel-sub { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
  #panel-close { position: absolute; top: 12px; right: 12px; background: none; border: none;
    color: var(--text-faint); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  #panel-close:hover { color: var(--text); }
  #panel-body { padding: 16px 20px 30px; overflow-y: auto; flex: 1; }
  #panel-body .summary { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 12px; }
  #panel-body .detail { font-size: 13.5px; color: var(--text-dim); line-height: 1.65; }
  #panel-body .detail p { margin-bottom: 10px; }
  #panel-body .detail code { background: #1e293b; padding: 1px 5px; border-radius: 4px;
    font-size: 12px; color: #7dd3fc; }
  #panel-body h3 { font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text-faint); margin: 20px 0 8px; }
  #panel-body ul { list-style: none; }
  #panel-body li { margin-bottom: 6px; font-size: 13px; }
  #panel-body a { color: #7dd3fc; text-decoration: none; }
  #panel-body a:hover { text-decoration: underline; }
  .conn { cursor: pointer; color: var(--text-dim); padding: 5px 8px; border-radius: 6px; }
  .conn:hover { background: #1e293b; color: var(--text); }
  .conn .arrow { color: var(--accent); margin: 0 4px; }
  .endpoint { cursor: pointer; color: #7dd3fc; }
  .endpoint:hover { text-decoration: underline; }
</style>
</head>
<body>
<svg id="canvas">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#475569"></path>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#22d3ee"></path>
    </marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e293b"></circle>
    </pattern>
  </defs>
  <rect id="bgrect" x="-8000" y="-8000" width="16000" height="16000" fill="url(#grid)"></rect>
  <g id="world"></g>
</svg>

<div id="header">
  <div id="title">
    <h1></h1>
    <div class="meta"></div>
  </div>
  <div id="searchbox">
    <input id="search" type="text" placeholder="Search components…" autocomplete="off">
    <div id="results"></div>
  </div>
</div>

<div id="legend">
  <div><span class="sw" style="border-color:#3b82f6"></span>Core component</div>
  <div><span class="sw" style="border-color:#f59e0b;border-style:dashed"></span>External dependency</div>
  <div><span class="sw" style="border-color:#64748b"></span>Support module</div>
</div>
<div id="help">drag to pan · scroll to zoom · click nodes &amp; arrows · double-click background to reset</div>

<aside id="panel">
  <div id="panel-head">
    <button id="panel-close" title="Close">✕</button>
    <span id="panel-kind"></span>
    <div id="panel-title"></div>
    <div id="panel-sub"></div>
  </div>
  <div id="panel-body"></div>
</aside>

<script>
const GRAPH = __GRAPH_DATA__;

const NODE_W = 190, NODE_H = 62;
const svg = document.getElementById('canvas');
const world = document.getElementById('world');
const panel = document.getElementById('panel');
const nodeById = {}, edgeById = {}, nodeEls = {}, edgeEls = {};
GRAPH.nodes.forEach(n => { n.w = n.w || NODE_W; n.h = n.h || NODE_H; nodeById[n.id] = n; });
GRAPH.edges.forEach(e => { edgeById[e.id] = e; });

/* ---------- header ---------- */
document.querySelector('#title h1').textContent = GRAPH.meta.title;
document.querySelector('#title .meta').innerHTML =
  '<a href="' + GRAPH.meta.repoUrl + '" target="_blank" rel="noopener">' + GRAPH.meta.repo + '</a>' +
  ' · ' + GRAPH.meta.commit + ' · generated ' + GRAPH.meta.generated +
  ' · ' + GRAPH.nodes.length + ' components, ' + GRAPH.edges.length + ' relationships';
document.title = GRAPH.meta.title;

/* ---------- geometry helpers ---------- */
function center(n) { return { x: n.x + n.w / 2, y: n.y + n.h / 2 }; }
function borderPoint(n, toward) {
  const c = center(n), dx = toward.x - c.x, dy = toward.y - c.y;
  if (dx === 0 && dy === 0) return c;
  const tx = dx !== 0 ? (n.w / 2 + 4) / Math.abs(dx) : Infinity;
  const ty = dy !== 0 ? (n.h / 2 + 4) / Math.abs(dy) : Infinity;
  const t = Math.min(tx, ty);
  return { x: c.x + dx * t, y: c.y + dy * t };
}
function edgePath(e) {
  const s = nodeById[e.source], t = nodeById[e.target];
  const sc = center(s), tc = center(t);
  const mid = { x: (sc.x + tc.x) / 2, y: (sc.y + tc.y) / 2 };
  const dx = tc.x - sc.x, dy = tc.y - sc.y, len = Math.hypot(dx, dy) || 1;
  const curve = e.curve || 0;
  const ctrl = { x: mid.x + (-dy / len) * curve, y: mid.y + (dx / len) * curve };
  const p1 = borderPoint(s, ctrl), p2 = borderPoint(t, ctrl);
  const label = {
    x: 0.25 * p1.x + 0.5 * ctrl.x + 0.25 * p2.x,
    y: 0.25 * p1.y + 0.5 * ctrl.y + 0.25 * p2.y - 6
  };
  return { d: `M ${p1.x} ${p1.y} Q ${ctrl.x} ${ctrl.y} ${p2.x} ${p2.y}`, label };
}
function el(name, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

/* ---------- render edges (under nodes) ---------- */
const edgeLayer = el('g', {}, world);
GRAPH.edges.forEach(e => {
  const g = el('g', { class: 'edge', 'data-id': e.id }, edgeLayer);
  const p = edgePath(e);
  el('path', { class: 'hit', d: p.d }, g);
  el('path', { class: 'line', d: p.d, 'marker-end': 'url(#arrow)' }, g);
  const t = el('text', { class: 'elabel', x: p.label.x, y: p.label.y, 'text-anchor': 'middle' }, g);
  t.textContent = e.label;
  g.addEventListener('click', ev => { ev.stopPropagation(); select('edge', e.id); });
  edgeEls[e.id] = g;
});

/* ---------- render nodes ---------- */
const nodeLayer = el('g', {}, world);
GRAPH.nodes.forEach(n => {
  const g = el('g', { class: 'node ' + n.kind, 'data-id': n.id, transform: `translate(${n.x} ${n.y})` }, nodeLayer);
  el('rect', { width: n.w, height: n.h, rx: 10 }, g);
  const l1 = el('text', { class: 'label', x: n.w / 2, y: 27, 'text-anchor': 'middle' }, g);
  l1.textContent = n.label;
  const l2 = el('text', { class: 'sublabel', x: n.w / 2, y: 45, 'text-anchor': 'middle' }, g);
  l2.textContent = n.sublabel || '';
  g.addEventListener('click', ev => { ev.stopPropagation(); select('node', n.id); });
  nodeEls[n.id] = g;
});

/* ---------- pan & zoom ---------- */
const view = { x: 0, y: 0, k: 1 };
function applyView() {
  world.setAttribute('transform', `translate(${view.x} ${view.y}) scale(${view.k})`);
  document.getElementById('bgrect').setAttribute('transform',
    `translate(${view.x % (28 * view.k)} ${view.y % (28 * view.k)}) scale(${view.k})`);
}
function fit() {
  const xs = GRAPH.nodes.map(n => n.x), ys = GRAPH.nodes.map(n => n.y);
  const x2 = GRAPH.nodes.map(n => n.x + n.w), y2 = GRAPH.nodes.map(n => n.y + n.h);
  const bx = Math.min(...xs), by = Math.min(...ys), bw = Math.max(...x2) - bx, bh = Math.max(...y2) - by;
  const W = svg.clientWidth, H = svg.clientHeight;
  view.k = Math.min((W - 120) / bw, (H - 160) / bh, 1.4);
  view.x = (W - bw * view.k) / 2 - bx * view.k;
  view.y = (H - bh * view.k) / 2 - by * view.k + 20;
  applyView();
}
let panning = false, moved = 0, px = 0, py = 0;
svg.addEventListener('pointerdown', ev => {
  if (ev.target.closest('.node') || ev.target.closest('.edge')) return;
  panning = true; moved = 0; px = ev.clientX; py = ev.clientY;
  svg.classList.add('panning'); svg.setPointerCapture(ev.pointerId);
});
svg.addEventListener('pointermove', ev => {
  if (!panning) return;
  const dx = ev.clientX - px, dy = ev.clientY - py;
  moved += Math.abs(dx) + Math.abs(dy);
  view.x += dx; view.y += dy; px = ev.clientX; py = ev.clientY; applyView();
});
svg.addEventListener('pointerup', ev => {
  if (panning && moved < 5) clearSelection(true);
  panning = false; svg.classList.remove('panning');
});
svg.addEventListener('wheel', ev => {
  ev.preventDefault();
  const factor = Math.exp(-ev.deltaY * 0.0012);
  const k2 = Math.min(2.5, Math.max(0.25, view.k * factor));
  const r = svg.getBoundingClientRect(), mx = ev.clientX - r.left, my = ev.clientY - r.top;
  view.x = mx - (mx - view.x) * (k2 / view.k);
  view.y = my - (my - view.y) * (k2 / view.k);
  view.k = k2; applyView();
}, { passive: false });
svg.addEventListener('dblclick', ev => {
  if (!ev.target.closest('.node') && !ev.target.closest('.edge')) fit();
});

/* ---------- selection & panel ---------- */
let selected = null; // {type, id}
function edgesOf(nodeId) {
  return GRAPH.edges.filter(e => e.source === nodeId || e.target === nodeId);
}
function clearSelection(updateHash) {
  selected = null;
  panel.classList.remove('open');
  Object.values(nodeEls).forEach(g => g.classList.remove('selected', 'dimmed'));
  Object.values(edgeEls).forEach(g => {
    g.classList.remove('selected', 'dimmed', 'hl');
    g.querySelector('.line').setAttribute('marker-end', 'url(#arrow)');
  });
  if (updateHash) history.replaceState(null, '', location.pathname + location.search);
}
function setMarker(edgeId, hl) {
  edgeEls[edgeId].querySelector('.line').setAttribute('marker-end', hl ? 'url(#arrow-hl)' : 'url(#arrow)');
}
function select(type, id, skipHash) {
  clearSelection(false);
  selected = { type, id };
  if (!skipHash) history.replaceState(null, '', '#' + type + '=' + id);

  if (type === 'node') {
    const n = nodeById[id];
    const conns = edgesOf(id);
    const neighborIds = new Set([id]);
    conns.forEach(e => { neighborIds.add(e.source); neighborIds.add(e.target); });
    Object.entries(nodeEls).forEach(([nid, g]) => {
      if (nid === id) g.classList.add('selected');
      else if (!neighborIds.has(nid)) g.classList.add('dimmed');
    });
    Object.entries(edgeEls).forEach(([eid, g]) => {
      const e = edgeById[eid];
      if (e.source === id || e.target === id) { g.classList.add('hl'); setMarker(eid, true); }
      else g.classList.add('dimmed');
    });
    showNodePanel(n, conns);
  } else {
    const e = edgeById[id];
    Object.entries(nodeEls).forEach(([nid, g]) => {
      if (nid !== e.source && nid !== e.target) g.classList.add('dimmed');
    });
    Object.entries(edgeEls).forEach(([eid, g]) => {
      if (eid === id) { g.classList.add('selected'); setMarker(eid, true); }
      else g.classList.add('dimmed');
    });
    showEdgePanel(e);
  }
  panel.classList.add('open');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showNodePanel(n, conns) {
  document.getElementById('panel-kind').textContent = n.kind;
  document.getElementById('panel-title').textContent = n.label;
  document.getElementById('panel-sub').textContent = n.sublabel || '';
  let html = '<div class="summary">' + esc(n.summary) + '</div>';
  html += '<div class="detail">' + n.detail + '</div>';
  if (n.files && n.files.length) {
    html += '<h3>Source</h3><ul>';
    n.files.forEach(f => {
      html += '<li><a href="' + f.url + '" target="_blank" rel="noopener">' + esc(f.path) + '</a></li>';
    });
    html += '</ul>';
  }
  if (conns.length) {
    html += '<h3>Connections</h3><ul>';
    conns.forEach(e => {
      const other = e.source === n.id ? e.target : e.source;
      const dir = e.source === n.id ? '→' : '←';
      html += '<li class="conn" data-edge="' + e.id + '">' +
        '<span class="arrow">' + dir + '</span>' + esc(nodeById[other].label) +
        ' <span style="color:var(--text-faint)">· ' + esc(e.label) + '</span></li>';
    });
    html += '</ul>';
  }
  const body = document.getElementById('panel-body');
  body.innerHTML = html;
  body.scrollTop = 0;
  body.querySelectorAll('.conn').forEach(li =>
    li.addEventListener('click', () => select('edge', li.dataset.edge)));
}
function showEdgePanel(e) {
  const s = nodeById[e.source], t = nodeById[e.target];
  document.getElementById('panel-kind').textContent = 'relationship';
  document.getElementById('panel-title').textContent = e.label;
  document.getElementById('panel-sub').textContent = '';
  let html = '<div class="summary">' +
    '<span class="endpoint" data-node="' + s.id + '">' + esc(s.label) + '</span>' +
    ' <span style="color:var(--accent)">→</span> ' +
    '<span class="endpoint" data-node="' + t.id + '">' + esc(t.label) + '</span></div>';
  html += '<div class="summary" style="font-weight:500;color:var(--text-dim)">' + esc(e.summary) + '</div>';
  html += '<div class="detail">' + e.detail + '</div>';
  const body = document.getElementById('panel-body');
  body.innerHTML = html;
  body.scrollTop = 0;
  body.querySelectorAll('.endpoint').forEach(sp =>
    sp.addEventListener('click', () => select('node', sp.dataset.node)));
}
document.getElementById('panel-close').addEventListener('click', () => clearSelection(true));
document.addEventListener('keydown', ev => { if (ev.key === 'Escape') clearSelection(true); });

/* ---------- search ---------- */
const searchInput = document.getElementById('search');
const results = document.getElementById('results');
function focusNode(id) {
  const n = nodeById[id], c = center(n);
  const W = svg.clientWidth, H = svg.clientHeight;
  view.k = Math.max(view.k, 0.9);
  view.x = W / 2 - c.x * view.k - 200 * 0.5; // bias left of detail panel
  view.y = H / 2 - c.y * view.k;
  applyView();
  select('node', id);
}
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  results.innerHTML = '';
  if (!q) { results.style.display = 'none'; return; }
  const matches = GRAPH.nodes.filter(n =>
    n.label.toLowerCase().includes(q) || (n.sublabel || '').toLowerCase().includes(q));
  matches.slice(0, 8).forEach(n => {
    const d = document.createElement('div');
    d.innerHTML = esc(n.label) + '<span class="k">' + esc(n.sublabel || '') + '</span>';
    d.addEventListener('mousedown', () => {
      results.style.display = 'none'; searchInput.value = '';
      focusNode(n.id);
    });
    results.appendChild(d);
  });
  results.style.display = matches.length ? 'block' : 'none';
});
searchInput.addEventListener('keydown', ev => {
  if (ev.key === 'Enter' && results.firstChild) results.firstChild.dispatchEvent(new Event('mousedown'));
  if (ev.key === 'Escape') { results.style.display = 'none'; searchInput.blur(); }
});
searchInput.addEventListener('blur', () => setTimeout(() => results.style.display = 'none', 150));

/* ---------- deep links ---------- */
function applyHash() {
  const m = location.hash.match(/^#(node|edge)=(.+)$/);
  if (!m) return;
  const [, type, id] = m;
  if (type === 'node' && nodeById[id]) focusNode(id);
  else if (type === 'edge' && edgeById[id]) select('edge', id, true);
}
window.addEventListener('hashchange', applyHash);

/* ---------- init ---------- */
fit();
applyHash();
window.addEventListener('resize', () => { if (!selected) fit(); });
</script>
</body>
</html>
